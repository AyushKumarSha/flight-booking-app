<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="card border-0 shadow rounded-4 p-5">
        <div class="mb-4">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
        </div>
        <h2 class="fw-bold text-success mb-2">Payment Successful!</h2>
        <p class="text-muted mb-4">Your flight has been booked successfully.</p>

        <div class="bg-light rounded-3 p-4 mb-4 text-start">
          <div class="row mb-2">
            <div class="col-6 text-muted">Booking ID</div>
            <div class="col-6 fw-bold">{{ bookingId }}</div>
          </div>
          <div class="row mb-2">
            <div class="col-6 text-muted">Transaction ID</div>
            <div class="col-6 fw-bold">{{ payment?.transactionId }}</div>
          </div>
          <div class="row mb-2">
            <div class="col-6 text-muted">Amount Paid</div>
            <div class="col-6 fw-bold text-success">₹{{ amount }}</div>
          </div>
          <div class="row">
            <div class="col-6 text-muted">Status</div>
            <div class="col-6">
              <span class="badge bg-success">CONFIRMED</span>
            </div>
          </div>
        </div>

        <div class="d-flex gap-3">
          <button class="btn btn-outline-primary flex-fill" (click)="downloadTicket()">
            <i class="bi bi-download me-2"></i>Download Ticket
          </button>
          <button class="btn btn-primary flex-fill" (click)="goHome()">
            <i class="bi bi-house me-2"></i>Back to Home
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
