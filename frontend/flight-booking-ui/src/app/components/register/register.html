<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-airplane-fill text-primary" style="font-size: 3rem;"></i>
              <h2 class="fw-bold mt-2">Create Account</h2>
              <p class="text-muted">Join FlightBook today</p>
            </div>
            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
            <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control form-control-lg"
                     [(ngModel)]="fullName" placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control form-control-lg"
                     [(ngModel)]="email" placeholder="Enter your email">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control form-control-lg"
                     [(ngModel)]="password" placeholder="Create a password">
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" class="form-control form-control-lg"
                     [(ngModel)]="confirmPassword" placeholder="Confirm your password">
            </div>
            <button class="btn btn-primary btn-lg w-100"
                    (click)="onRegister()" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'Creating account...' : 'Create Account' }}
            </button>
            <p class="text-center mt-3 text-muted">
              Already have an account?
              <a routerLink="/login" class="text-primary fw-semibold">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
