<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card border-0 shadow rounded-4">
        <div class="card-header bg-primary text-white rounded-top-4 p-4">
          <h4 class="mb-0 fw-bold">
            <i class="bi bi-ticket-fill me-2"></i>Booking Summary
          </h4>
        </div>
        <div class="card-body p-4">
          <div class="row mb-3">
            <div class="col-6">
              <p class="text-muted mb-1">Flight</p>
              <p class="fw-bold">{{ flightNumber }}</p>
            </div>
            <div class="col-6">
              <p class="text-muted mb-1">Travel Date</p>
              <p class="fw-bold">{{ travelDate }}</p>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <p class="text-muted mb-1">From</p>
              <p class="fw-bold">{{ source }}</p>
            </div>
            <div class="col-6">
              <p class="text-muted mb-1">To</p>
              <p class="fw-bold">{{ destination }}</p>
            </div>
          </div>
          <hr>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fs-5 fw-bold">Total Amount</span>
            <span class="fs-4 fw-bold text-success">₹{{ amount }}</span>
          </div>
          <div class="d-flex gap-3">
            <button class="btn btn-outline-secondary flex-fill" (click)="goBack()">
              <i class="bi bi-arrow-left me-2"></i>Go Back
            </button>
            <button class="btn btn-primary flex-fill" (click)="proceedToPayment()">
              Proceed to Payment<i class="bi bi-arrow-right ms-2"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
